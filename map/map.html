<!DOCTYPE html>
<html><head>
  <link rel="stylesheet" href="leaflet.css" />
  <script src="leaflet.js"></script>
</head><body style="margin:0">
  <div id="map" style="height:100vh"></div>
  <script>

    var southWest = L.latLng(45.0, 10.0); // Południowy zachód
    var northEast = L.latLng(60.0, 30.0); // Północny wschód
    var bounds = L.latLngBounds(southWest, northEast);
    const map = L.map('map', {
      maxBounds: bounds,
      maxBoundsViscosity: 1.0,
      minZoom: 7,
      maxZoom: 18
    }).setView([51.8, 18.94], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markers = {};

    
    function loadAirports(data) {
      data.forEach(airport => {
          L.circleMarker([airport.latitude, airport.longitude])
          .addTo(map)
          .bindPopup(airport.monitored_airport_code + "<br>" + airport.monitored_airport_name);
      });
    };

    function loadRoutes(routes) {
        routes.forEach(route => {
            const latStart = route[0];
            const lngStart = route[1];
            const latEnd   = route[2];
            const lngEnd   = route[3];
            const count    = route[4];

            const lineCoordinates = [
                [latStart, lngStart],
                [latEnd, lngEnd]
            ];

            const lineWidth = Math.min(Math.max(count / 10, 2), 11);

            // Rysowanie linii na mapie
            L.polyline(lineCoordinates, {
                color: '#2b7bba', // ładny odcień niebieskiego
                weight: lineWidth,
                opacity: 0.6,
                smoothFactor: 1.0
            }).addTo(map);
        });
      };

    
  </script>
</body></html>
